<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --accent:#ff84b7;
    --accent2:#ff3d7a;
    --bg:#09070d;
    --panel:#130a17;
    --text:#ffffff;
    --text2:rgba(255,255,255,0.65);
    --card:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.08);
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Cairo',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* APP */

.app{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--bg);
    transition:0.5s;
}

/* MAIN */

.main{
    flex:1;
    display:grid;
    grid-template-columns:40% 60%;
    overflow:hidden;
}

/* LEFT */

.left{
    position:relative;
    background:var(--panel);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    transition:0.5s;
}

.circle1,
.circle2,
.square1,
.square2{
    position:absolute;
    border:1px solid rgba(255,255,255,0.08);
}

.circle1{
    width:340px;
    height:340px;
    border-radius:50%;
    top:-120px;
    right:-120px;
}

.circle2{
    width:150px;
    height:150px;
    border-radius:50%;
    bottom:15%;
    right:10%;
    animation:float 4s ease-in-out infinite;
}

.square1{
    width:200px;
    height:200px;
    transform:rotate(45deg);
    bottom:-70px;
    left:-70px;
}

.square2{
    width:70px;
    height:70px;
    transform:rotate(25deg);
    top:18%;
    left:15%;
    animation:float 5s ease-in-out infinite reverse;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-15px);
    }
}

/* AVATAR */

.avatar-wrap{
    position:relative;
    z-index:5;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.avatar-outer{
    width:220px;
    height:220px;
    border-radius:50%;
    border:2px solid var(--border);
    display:flex;
    justify-content:center;
    align-items:center;
    animation:spin 15s linear infinite;
    box-shadow:0 0 70px rgba(255,255,255,0.05),
    0 0 50px var(--accent2);
}

.avatar-inner{
    width:180px;
    height:180px;
    border-radius:50%;
    background:var(--card);
    border:1px solid var(--border);
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(12px);
    animation:spin2 15s linear infinite;
}

.avatar-letter{
    font-size:90px;
    font-weight:900;
    color:var(--accent);
    font-family:'Amiri',serif;
    text-shadow:0 0 25px var(--accent2);
    animation:spin2 15s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes spin2{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(-360deg);
    }
}

.dots{
    display:flex;
    gap:8px;
}

.dots span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent);
    animation:pulse 1.5s infinite;
}

.dots span:nth-child(2){
    animation-delay:0.3s;
}

.dots span:nth-child(3){
    animation-delay:0.6s;
}

@keyframes pulse{
    0%,100%{
        opacity:0.4;
        transform:scale(1);
    }
    50%{
        opacity:1;
        transform:scale(1.5);
    }
}

/* RIGHT */

.right{
    position:relative;
    overflow-y:auto;
    padding:55px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.right::-webkit-scrollbar{
    width:0;
}

.right::before{
    content:'';
    position:absolute;
    right:0;
    top:0;
    width:3px;
    height:100%;
    background:linear-gradient(to bottom,transparent,var(--accent2),transparent);
}

/* CONTENT */

.tag{
    width:fit-content;
    padding:7px 18px;
    border-radius:100px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--accent);
    font-size:13px;
    margin-bottom:20px;
}

.name{
    font-size:68px;
    line-height:1.1;
    font-family:'Amiri',serif;
    margin-bottom:10px;
}

.job{
    font-size:22px;
    color:var(--accent);
    margin-bottom:12px;
}

.quote{
    color:var(--text2);
    font-size:14px;
    margin-bottom:28px;
    font-style:italic;
}

.line{
    width:100%;
    height:1px;
    background:linear-gradient(to left,var(--border),transparent);
    margin-bottom:28px;
}

.desc{
    font-size:17px;
    line-height:2;
    color:var(--text2);
    max-width:700px;
    margin-bottom:35px;
}

.skills-title{
    font-size:12px;
    letter-spacing:3px;
    color:var(--accent);
    margin-bottom:15px;
}

.skills{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.skill{
    padding:8px 15px;
    border-radius:8px;
    background:var(--card);
    border:1px solid var(--border);
    font-size:13px;
    transition:0.3s;
}

.skill:hover{
    transform:translateY(-3px);
    background:var(--accent2);
}

/* TABS */

.tabs{
    height:85px;
    display:flex;
    align-items:center;
    gap:10px;
    overflow-x:auto;
    padding:0 20px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
}

.tabs::-webkit-scrollbar{
    height:3px;
}

.tabs::-webkit-scrollbar-thumb{
    background:var(--accent2);
}

.tab{
    flex-shrink:0;
    padding:12px 22px;
    border-radius:10px;
    border:1px solid transparent;
    background:transparent;
    color:rgba(255,255,255,0.45);
    cursor:pointer;
    transition:0.3s;
    font-size:14px;
}

.tab:hover{
    background:var(--card);
    border-color:var(--border);
    color:white;
}

.tab.active{
    background:var(--card);
    border-color:var(--accent);
    color:var(--accent);
    box-shadow:0 0 20px rgba(255,255,255,0.05);
}

/* MOBILE */

@media(max-width:950px){

    .main{
        grid-template-columns:1fr;
        grid-template-rows:33% 67%;
    }

    .right{
        padding:30px;
    }

    .right::before{
        display:none;
    }

    .name{
        font-size:42px;
    }

    .job{
        font-size:18px;
    }

    .desc{
        font-size:15px;
    }

    .avatar-outer{
        width:150px;
        height:150px;
    }

    .avatar-inner{
        width:120px;
        height:120px;
    }

    .avatar-letter{
        font-size:55px;
    }

}

@media(max-width:600px){

    .main{

    }

    .right{

    }

    .name{

    }

    .job{

    }

    .desc{

    }

    .quote{

    }

    .tabs{

    }

    .tab{

    }

    .avatar-outer{
        width:120px;
        height:120px;
    }

    .avatar-inner{
        width:95px;
        height:95px;
    }

    .avatar-letter{
        font-size:42px;
    }

}

</style>
</head>
